name: doc-sync

on:
  pull_request:
    paths:
      - JA.md
      - EN.md
      - scripts/check_doc_sync.sh
      - .github/workflows/doc-sync.yml
      - README.md
  push:
    branches:
      - main
    paths:
      - JA.md
      - EN.md
      - scripts/check_doc_sync.sh
      - .github/workflows/doc-sync.yml
      - README.md
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Verify JA/EN structure sync
        run: bash scripts/check_doc_sync.sh JA.md EN.md
